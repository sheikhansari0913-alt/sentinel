name: Build Sentinel

# Runs on every push to main/master and can be triggered manually
# from the Actions tab (Run workflow button).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    # GitHub's free Windows VM already has .NET, MSBuild and Chocolatey.
    # We add Inno Setup ourselves to build the installer.
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Sentinel/Sentinel.csproj

      # Self-contained: the published folder bundles the .NET 8 runtime so the
      # installed app runs on any Windows 10/11 x64 machine even without .NET
      # installed. Kept on ONE line so YAML can't mangle the arguments.
      - name: Publish (self-contained)
        run: dotnet publish Sentinel/Sentinel.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Install Inno Setup 6
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\sentinel.iss
          if (-not (Test-Path "installer\Output\Sentinel-Setup.exe")) {
            throw "Installer was not produced."
          }
          Get-Item "installer\Output\Sentinel-Setup.exe" |
            Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,2)}}

      - name: Upload installer as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sentinel-Setup
          path: installer/Output/Sentinel-Setup.exe
          retention-days: 30

      # OPTIONAL: pushing a tag like v1.0.0 also publishes a public GitHub
      # Release with the installer attached — a permanent download URL you can
      # cite in your project report.
      - name: Create Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/Sentinel-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
